name: Release

on:
  push:
    branches: [ main ]
    # 当commit消息以V开头时触发
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    name: 构建打包
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            python-version: '3.10'
            platform: ubuntu
            binary_name: steam_hosts_updater_ubuntu
          - os: macos-latest
            python-version: '3.10'
            platform: mac
            binary_name: steam_hosts_updater_macos
          - os: windows-latest
            python-version: '3.10'
            platform: windows
            binary_name: steam_hosts_updater_windows.exe
    
    steps:
    - uses: actions/checkout@v6
    
    - name: 设置Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt
    
    - name: 构建 query_dns 可执行文件
      run: |
        pyinstaller --onefile --name query_dns_${{ matrix.platform }} query_dns.py
    
    - name: 构建 install_hosts 可执行文件
      run: |
        pyinstaller --onefile --name install_hosts_${{ matrix.platform }} install_hosts.py
    
    - name: 上传构建产物
      uses: actions/upload-artifact@v3
      with:
        name: ${{ matrix.platform }}-binaries
        path: |
          dist/query_dns_${{ matrix.platform }}*
          dist/install_hosts_${{ matrix.platform }}*
    
  release:
    name: 创建Release
    needs: build
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, 'V') || github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v6
    
    - name: 下载所有产物
      uses: actions/download-artifact@v8
      with:
        path: artifacts
    
    - name: 显示文件结构
      run: |
        ls -R artifacts/
    
    - name: 获取版本号
      id: get_version
      run: |
        if [[ "${{ github.event.head_commit.message }}" =~ V([0-9]+\.[0-9]+\.[0-9]+) ]]; then
          VERSION="${BASH_REMATCH[1]}"
        else
          VERSION="v$(date +%Y.%m.%d)"
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Release版本: $VERSION"
    
    - name: 创建Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.get_version.outputs.version }}
        name: Steam Hosts Updater ${{ steps.get_version.outputs.version }}
        body: |
          ## Steam Hosts Updater ${{ steps.get_version.outputs.version }}
          
          ### 下载说明
          根据你的操作系统下载对应的可执行文件：
          - **Windows**: 下载 `steam_hosts_updater_windows.exe`
          - **macOS**: 下载 `steam_hosts_updater_macos`
          - **Ubuntu/Linux**: 下载 `steam_hosts_updater_ubuntu`
          
          ### 使用方法
          1. 查询并生成hosts文件：
             - Windows: `query_dns_windows.exe`
             - macOS: `./query_dns_macos`
             - Linux: `./query_dns_ubuntu`
          
          2. 安装hosts到系统：
             - Windows (需要管理员权限): 右键"以管理员身份运行" `install_hosts_windows.exe`
             - macOS/Linux: `sudo ./install_hosts_macos` 或 `sudo ./install_hosts_ubuntu`
          
          ### 变更内容
          请查看 [提交历史](${{ github.repository }}/commits/main) 了解详细变更。
        files: |
          artifacts/ubuntu-binaries/*
          artifacts/mac-binaries/*
          artifacts/windows-binaries/*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
