name: Release

on:
  push:
    branches: [ main ]
    # 当commit消息以V开头时触发
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    name: 构建打包
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            python-version: '3.10'
            platform: ubuntu
            binary_name: steam_hosts_updater_ubuntu
          - os: macos-latest
            python-version: '3.10'
            platform: mac
            binary_name: steam_hosts_updater_macos
          - os: windows-latest
            python-version: '3.10'
            platform: windows
            binary_name: steam_hosts_updater_windows.exe
    
    steps:
    - uses: actions/checkout@v6
    
    - name: 设置Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt
    
    - name: 构建 SteamHosts_Updater 单文件可执行文件
      shell: bash
      run: |
        # 设置路径分隔符
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          SEP=";"
        else
          SEP=":"
        fi

        # 使用 PyInstaller 命令行方式打包，包含所有必需的依赖
        pyinstaller --onefile --name SteamHosts_Updater --add-data "config.yaml${SEP}." --hidden-import yaml --hidden-import yaml.scanner --hidden-import yaml.parser --hidden-import yaml.loader --hidden-import yaml.dumper --hidden-import yaml.resolver --log-level INFO SteamHosts_Updater.py
    
    - name: 获取版本号
      id: get_version
      run: |
        if [[ "${{ github.event.head_commit.message }}" =~ V([0-9]+\.[0-9]+\.[0-9]+) ]]; then
          VERSION="${BASH_REMATCH[1]}"
        else
          VERSION="v$(date +%Y.%m.%d)"
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Release版本: $VERSION"

    - name: 重命名输出文件
      shell: bash
      run: |
        # 移除版本号中的 'v' 前缀（如果有）
        VERSION="${{ steps.get_version.outputs.version }}"
        VERSION="${VERSION#v}"

        # 重命名文件
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          mv dist/SteamHosts_Updater.exe "dist/SteamHosts_Updater_standalone_${{ matrix.platform }}_${VERSION}.exe"
        else
          mv dist/SteamHosts_Updater "dist/SteamHosts_Updater_standalone_${{ matrix.platform }}_${VERSION}"
        fi

    - name: 显示构建产物
      run: |
        ls -la dist/

    - name: 上传构建产物
      uses: actions/upload-artifact@v6
      with:
        name: ${{ matrix.platform }}-binaries
        path: dist/SteamHosts_Updater_standalone_${{ matrix.platform }}_*
    
  release:
    name: 创建Release
    needs: build
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, 'V') || github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v6
    
    - name: 下载所有产物
      uses: actions/download-artifact@v8
      with:
        path: artifacts
    
    - name: 显示文件结构
      run: |
        ls -R artifacts/
    
    - name: 获取版本号
      id: get_version
      run: |
        if [[ "${{ github.event.head_commit.message }}" =~ V([0-9]+\.[0-9]+\.[0-9]+) ]]; then
          VERSION="${BASH_REMATCH[1]}"
        else
          VERSION="v$(date +%Y.%m.%d)"
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Release版本: $VERSION"

    - name: 创建Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.get_version.outputs.version }}
        name: Steam Hosts Updater ${{ steps.get_version.outputs.version }}
        body: |
          ## Steam Hosts Updater ${{ steps.get_version.outputs.version }}

          ### 下载说明
          根据你的操作系统下载对应的可执行文件：
          - **Windows**: 下载 `SteamHosts_Updater_standalone_windows_${{ steps.get_version.outputs.version }}.exe`
          - **macOS**: 下载 `SteamHosts_Updater_standalone_mac_${{ steps.get_version.outputs.version }}`
          - **Ubuntu/Linux**: 下载 `SteamHosts_Updater_standalone_ubuntu_${{ steps.get_version.outputs.version }}`

          ### 使用方法

          1. 直接安装到系统（默认）：
             ```bash
             # Windows（需要管理员权限）
             SteamHosts_Updater_standalone_windows_X.X.X.exe

             # macOS/Linux（需要root权限）
             sudo ./SteamHosts_Updater_standalone_ubuntu_X.X.X
             ```

          2. 只生成hosts文件：
             ```bash
             # Windows
             SteamHosts_Updater_standalone_windows_X.X.X.exe -o

             # macOS/Linux
             ./SteamHosts_Updater_standalone_ubuntu_X.X.X -o
             ```

          3. 生成日志文件：
             ```bash
             # Windows
             SteamHosts_Updater_standalone_windows_X.X.X.exe --log

             # macOS/Linux
             ./SteamHosts_Updater_standalone_ubuntu_X.X.X --log
             ```

          4. 生成配置文件：
             ```bash
             SteamHosts_Updater_standalone_windows_X.X.X.exe --init-config
             ```

          ### 配置
          程序会自动读取同目录下的 `config.yaml` 配置文件（如果存在），否则使用内置默认配置。

          ### 变更内容
          请查看 [提交历史](${{ github.repository }}/commits/main) 了解详细变更。
        files: |
          artifacts/ubuntu-binaries/*
          artifacts/mac-binaries/*
          artifacts/windows-binaries/*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
